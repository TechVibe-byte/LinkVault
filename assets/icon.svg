<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect for clean standalone visual -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Outer glowing rings/accents -->
  <circle cx="256" cy="256" r="200" stroke="url(#grad1)" stroke-width="8" fill="none" opacity="0.15" />
  <circle cx="256" cy="256" r="170" stroke="url(#grad2)" stroke-width="4" fill="none" opacity="0.1" stroke-dasharray="10 15" />
  
  <!-- Stylized Open Book -->
  <path d="M 120 380 Q 256 380 256 340 Q 256 380 392 380 L 412 170 Q 256 170 256 130 Q 256 170 100 170 Z" fill="url(#grad1)" />
  <path d="M 256 130 L 256 340" stroke="#0f172a" stroke-width="6" />
  
  <!-- Connecting nodes representing knowledge & learning path -->
  <g fill="#ffffff">
    <!-- Center Node (Core Idea) -->
    <circle cx="256" cy="210" r="14" fill="url(#grad2)" stroke="#ffffff" stroke-width="3" />
    
    <!-- Connected Nodes -->
    <circle cx="200" cy="180" r="10" />
    <circle cx="312" cy="180" r="10" />
    <circle cx="180" cy="250" r="10" />
    <circle cx="332" cy="250" r="10" />
    <circle cx="210" cy="300" r="10" />
    <circle cx="302" cy="300" r="10" />
    
    <!-- Connection lines -->
    <line x1="256" y1="210" x2="200" y2="180" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    <line x1="256" y1="210" x2="312" y2="180" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    <line x1="256" y1="210" x2="180" y2="250" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    <line x1="256" y1="210" x2="332" y2="250" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    <line x1="180" y1="250" x2="210" y2="300" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    <line x1="332" y1="250" x2="302" y2="300" stroke="#ffffff" stroke-width="3" opacity="0.8" />
  </g>
  
  <!-- Graduation cap or crown of learning accent at the top -->
  <path d="M 256 70 L 290 85 L 256 100 L 222 85 Z" fill="url(#grad2)" />
  <line x1="290" y1="85" x2="290" y2="105" stroke="url(#grad2)" stroke-width="3" />
  <circle cx="290" cy="107" r="4" fill="url(#grad2)" />
</svg>
